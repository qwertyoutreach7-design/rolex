services:
  # Streamlit веб-інтерфейс
  - type: web
    name: serp-parser-ui
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: TG_BOT_TOKEN
        value: 8683656869:AAEZb8YZmgjUFCHXVFQ1f_C6qq-Nx64dBKU
      - key: TG_CHAT_ID
        value: "909587225"

  # Автопарсер (фоновий воркер)
  - type: worker
    name: serp-parser-scheduler
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python scheduler.py
    envVars:
      - key: TG_BOT_TOKEN
        value: 8683656869:AAEZb8YZmgjUFCHXVFQ1f_C6qq-Nx64dBKU
      - key: TG_CHAT_ID
        value: "909587225"
      - key: AUTO_INTERVAL_HOURS
        value: "3"

  # Telegram-бот з меню (ручний запуск парсингу)
  - type: worker
    name: serp-parser-tg-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python tg_bot.py
    envVars:
      - key: TG_BOT_TOKEN
        value: 8683656869:AAEZb8YZmgjUFCHXVFQ1f_C6qq-Nx64dBKU
      - key: TG_CHAT_ID
        value: "909587225"
